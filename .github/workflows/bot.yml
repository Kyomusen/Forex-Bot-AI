name: Forex Bot

on:
  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Restore candle cache
        uses: actions/cache@v4
        id: candle-cache
        with:
          path: logs/candle_cache.json
          key: candle-cache-${{ github.run_id }}
          restore-keys: |
            candle-cache-

      - name: Restore knowledge & trade history
        uses: actions/cache@v4
        id: knowledge-cache
        with:
          path: |
            logs/knowledge.md
            logs/trade_history.json
          key: knowledge-${{ github.run_id }}
          restore-keys: |
            knowledge-

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential pkg-config libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install dependencies
        run: npm ci

      - name: Run bot (one cycle)
        run: node src/bot.js
        env:
          SINGLE_RUN: 'true'
          CAPITAL_EMAIL: ${{ secrets.CAPITAL_EMAIL }}
          CAPITAL_PASSWORD: ${{ secrets.CAPITAL_PASSWORD }}
          CAPITAL_API_KEY: ${{ secrets.CAPITAL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SYMBOLS: ${{ secrets.SYMBOLS }}
          TIMEFRAME: ${{ secrets.TIMEFRAME }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ACCOUNT_BALANCE: ${{ secrets.ACCOUNT_BALANCE }}
          RISK_PERCENT: ${{ secrets.RISK_PERCENT }}
