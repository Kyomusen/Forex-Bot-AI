name: AI Learn (Standalone)

on:
  workflow_dispatch:

jobs:
  ai-learn:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run AI Learn
        run: node src/aiLearn.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FALLBACK_GEMINI_API_KEY: ${{ secrets.FALLBACK_GEMINI_API_KEY }}
          FALLBACK_GEMINI_API_KEY_2: ${{ secrets.FALLBACK_GEMINI_API_KEY_2 }}

      - name: Commit updated rules
        run: |
          git config user.name "forex-bot"
          git config user.email "bot@forex.ai"
          git add logs/ai_learned_rules.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update AI learned rules [skip ci]"
            git push
          fi

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-learn-logs
          path: logs/
