name: Backtest + AI Learn

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: 'Symbols (comma-separated)'
        required: true
        default: 'XAUUSD'
      candles:
        description: 'Number of candles'
        required: true
        default: '5000'
      offset:
        description: 'Candle offset from latest'
        required: true
        default: '0'
      use_ai:
        description: 'Use AI filter (true/false)'
        required: true
        default: 'false'
      random_signals:
        description: 'Random signals per symbol for AI (0 = all)'
        required: true
        default: '0'
      segments:
        description: 'Walk-forward segments'
        required: true
        default: '1'
      learn:
        description: 'Run AI learn after backtest (true/false)'
        required: true
        default: 'true'
      ai_skip_rate:
        description: 'AI skip analysis rate (0=disabled, 1.0=100%)'
        required: true
        default: '1.0'
      setups:
        description: 'Allowed setups (comma-separated)'
        required: true
        default: 'trend_buy,trend_sell'
      trend_mode:
        description: 'Trend filter: AND or OR'
        required: true
        default: 'OR'
      sr_atr:
        description: 'S/R proximity ATR multiplier'
        required: true
        default: '0.3'
      trailing:
        description: 'Enable trailing stop (true/false)'
        required: true
        default: 'true'
      trailing_activate:
        description: 'ATR profit to activate trailing'
        required: true
        default: '1.0'
      trailing_distance:
        description: 'ATR distance for trailing SL'
        required: true
        default: '0.5'
      atr_sl:
        description: 'ATR SL multiplier'
        required: true
        default: '1.0'
      atr_tp:
        description: 'ATR TP multiplier'
        required: true
        default: '5.0'
      risk:
        description: 'Risk percent per trade'
        required: true
        default: '1'
      spread:
        description: 'Spread pips'
        required: true
        default: '0.4'

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Restore candle cache
        uses: actions/cache@v4
        id: candle-cache
        with:
          path: logs/candle_cache.json
          key: candle-cache-${{ github.run_id }}
          restore-keys: |
            candle-cache-

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential pkg-config libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install dependencies
        run: npm ci

      - name: Run backtest
        run: node src/backtest.js
        env:
          BACKTEST_SYMBOLS: ${{ github.event.inputs.symbols }}
          BACKTEST_CANDLES: ${{ github.event.inputs.candles }}
          BACKTEST_OFFSET: ${{ github.event.inputs.offset }}
          BACKTEST_USE_AI: ${{ github.event.inputs.use_ai }}
          BACKTEST_RANDOM_SIGNALS: ${{ github.event.inputs.random_signals }}
          BACKTEST_SEGMENTS: ${{ github.event.inputs.segments }}
          BACKTEST_LEARN: ${{ github.event.inputs.learn }}
          BACKTEST_AI_SKIP_RATE: ${{ github.event.inputs.ai_skip_rate }}
          BACKTEST_TF: 'HOUR'
          BACKTEST_SETUPS: ${{ github.event.inputs.setups }}
          BACKTEST_NO_MACD_FILTER: 'true'
          BACKTEST_NO_RSI_FILTER: 'true'
          BACKTEST_NO_EMA_FILTER: 'true'
          BACKTEST_TREND_MODE: ${{ github.event.inputs.trend_mode }}
          BACKTEST_SR_ATR: ${{ github.event.inputs.sr_atr }}
          BACKTEST_TRAILING: ${{ github.event.inputs.trailing }}
          BACKTEST_TRAILING_ACTIVATE: ${{ github.event.inputs.trailing_activate }}
          BACKTEST_TRAILING_DISTANCE: ${{ github.event.inputs.trailing_distance }}
          BACKTEST_ATR_SL: ${{ github.event.inputs.atr_sl }}
          BACKTEST_ATR_TP: ${{ github.event.inputs.atr_tp }}
          BACKTEST_RISK: ${{ github.event.inputs.risk }}
          BACKTEST_SPREAD_PIPS: ${{ github.event.inputs.spread }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FALLBACK_GEMINI_API_KEY: ${{ secrets.FALLBACK_GEMINI_API_KEY }}
          FALLBACK_GEMINI_API_KEY_2: ${{ secrets.FALLBACK_GEMINI_API_KEY_2 }}
          CAPITAL_EMAIL: ${{ secrets.CAPITAL_EMAIL }}
          CAPITAL_PASSWORD: ${{ secrets.CAPITAL_PASSWORD }}
          CAPITAL_API_KEY: ${{ secrets.CAPITAL_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Commit updated knowledge
        run: |
          git config user.name "forex-bot"
          git config user.email "bot@forex.ai"
          git add -f logs/filter_knowledge.json logs/filter_wisdom.md logs/ai_learned_rules.json logs/logic_learned_rules.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No knowledge changes to commit"
          else
            git commit -m "chore: update backtest knowledge (BT: ${{ github.event.inputs.symbols }}/${{ github.event.inputs.candles }}c/${{ github.event.inputs.offset }}o/${{ github.event.inputs.use_ai }}ai) [skip ci]"
            git push
          fi

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-logs
          path: logs/
