name: Backtest Pure

on:
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Restore candle cache
        uses: actions/cache@v4
        id: candle-cache
        with:
          path: logs/candle_cache.json
          key: candle-cache-${{ github.run_id }}
          restore-keys: |
            candle-cache-

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential pkg-config libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install dependencies
        run: npm ci

      - name: Run pure strategy backtest
        run: node scripts/backtest_pure.js
        env:
          BT_SYMBOLS: 'XAUUSD'
          BT_CANDLES: '20000'
          BT_TF: 'HOUR'
          BT_TREND_MODE: 'AND'
          BT_SR_ATR: '0.3'
          BT_TRAILING: 'true'
          BT_TRAILING_ACTIVATE: '0.5'
          BT_TRAILING_DISTANCE: '0.3'
          BT_ATR_SL: '1.0'
          BT_ATR_TP: '5.0'
          BT_RISK: '1'
          BT_SPREAD: '0.4'
          BT_NO_MACD_FILTER: 'true'
          BT_NO_RSI_FILTER: 'true'
          BT_NO_EMA_FILTER: 'true'
          BT_SETUPS: 'trend_buy,trend_sell'
          CAPITAL_EMAIL: ${{ secrets.CAPITAL_EMAIL }}
          CAPITAL_PASSWORD: ${{ secrets.CAPITAL_PASSWORD }}
          CAPITAL_API_KEY: ${{ secrets.CAPITAL_API_KEY }}

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-pure-logs
          path: logs/
